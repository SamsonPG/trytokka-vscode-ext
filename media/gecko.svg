<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Activity-bar icon: VS Code renders this MONOCHROME (single theme colour),
       so it must be a transparent-background silhouette, not the full-colour
       mascot. Same Scout gecko head as the panel logo; the two eyes are punched
       out with fill-rule="evenodd" so it reads as a gecko face, not a blob. -->
  <path fill-rule="evenodd" fill="#34D399"
        d="M 22 48 Q 18 24 50 20 Q 80 22 82 46 Q 84 58 68 64 Q 50 69 34 63 Q 20 58 22 48 Z
           M 25 40 a 10 10 0 1 0 20 0 a 10 10 0 1 0 -20 0 Z
           M 55 40 a 10 10 0 1 0 20 0 a 10 10 0 1 0 -20 0 Z"/>
</svg>
