name: Publish extension

# Publishes the extension whenever you push a version tag (e.g. v1.0.1),
# so releasing is just: bump the version in package.json → commit → tag → push.
# No more "I forgot to publish the update".
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps Personal Access Token for the `trytokka` publisher
#               (Marketplace → Manage Publishers → grant Marketplace: Manage).
#   OVSX_PAT  — open-vsx.org access token (optional; enables Cursor / VSCodium).
#
# A missing secret simply skips that registry — it won't fail the run.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {} # allow a manual publish from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump package.json before tagging."
            exit 1
          fi
          echo "Publishing version $PKG"

      - name: Package .vsix
        run: npx @vscode/vsce package --allow-missing-repository -o extension.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX (Cursor / VSCodium)
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish extension.vsix -p "$OVSX_PAT"

      - name: Attach .vsix to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
